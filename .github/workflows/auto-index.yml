name: Google Indexing — Daily

on:
  schedule:
    - cron: "0 9 * * *"       # Every day at 09:00 UTC
  workflow_dispatch:            # Manual trigger

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run auto-index script
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: node scripts/auto-index-google.mjs

      - name: Commit indexed-urls.json log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add indexed-urls.json
          git diff --staged --quiet || git commit -m "chore: update indexed-urls.json [skip ci]"
          git push
