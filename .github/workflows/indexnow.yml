name: IndexNow — Submit to Bing/Yandex

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Submit URLs to IndexNow
        run: node scripts/indexnow.mjs

      - name: Commit indexnow-log.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add indexnow-log.json
          git diff --staged --quiet || git commit -m "chore: update indexnow-log.json [skip ci]"
          git push
