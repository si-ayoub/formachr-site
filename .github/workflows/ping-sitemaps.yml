name: Ping Sitemaps — Google + Bing + IndexNow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ping all indexing services
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: node scripts/ping-sitemaps.mjs

      - name: Commit ping log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ping-sitemaps-log.json
          git diff --staged --quiet || git commit -m "chore: update ping-sitemaps-log.json [skip ci]"
          git push
